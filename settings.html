<div class="clavis-salomonis-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>🔑 ClavisSalomonis</b><span id="clavis_title_badge" class="clavis-new-badge">NEW</span>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="clavis_block flex-container">
                <input id="clavis_enabled" type="checkbox" />
                <label for="clavis_enabled">
                    <span data-i18n="Enable Extension">启用扩展</span>
                </label>
            </div>

            <div id="clavis_preset_warning" class="clavis_preset_warning" style="display: none;"></div>
            <div id="clavis_preset_info" class="clavis_preset_info" style="display: none;"></div>

            <hr class="sysHR" />
            <h4 data-i18n="Template Mode">📋 模板模式</h4>
            
            <div class="clavis_block flex-container">
                <input id="clavis_template_mode_default" type="radio" name="template_mode" value="default" />
                <label for="clavis_template_mode_default">
                    <small data-i18n="Default Templates">默认提示词模板</small>
                </label>
            </div>
            
            <div class="clavis_block flex-container">
                <input id="clavis_template_mode_custom" type="radio" name="template_mode" value="custom" />
                <label for="clavis_template_mode_custom">
                    <small data-i18n="Custom Templates">自定义提示词模板</small>
                </label>
            </div>
            
            <div id="clavis_template_editor" style="display: none;">
                <hr class="sysHR" />
                <h4 data-i18n="Custom Template Editor">✏️ 自定义模板编辑</h4>
                
                <div class="clavis_block">
                    <label><small data-i18n="Identity Reset Template">身份重置</small></label>
                    <textarea id="clavis_template_identityReset" class="text_pole" rows="3"></textarea>
                </div>
                
                <div class="clavis_block">
                    <label><small data-i18n="Scenario Framework Template">场景框架构建</small></label>
                    <textarea id="clavis_template_scenarioFramework" class="text_pole" rows="3"></textarea>
                </div>
                
                <div class="clavis_block">
                    <label><small data-i18n="AI Self Persuasion Template">AI自我说服</small></label>
                    <textarea id="clavis_template_aiSelfPersuasion" class="text_pole" rows="3"></textarea>
                </div>
                
                <div class="clavis_block">
                    <label><small data-i18n="Roleplay Induction Template">角色扮演诱导</small></label>
                    <textarea id="clavis_template_roleplayInduction" class="text_pole" rows="3"></textarea>
                </div>
                
                <div class="clavis_block">
                    <label><small data-i18n="Safety Statement Template">安全声明转移</small></label>
                    <textarea id="clavis_template_safetyStatement" class="text_pole" rows="3"></textarea>
                </div>
                
                <div class="clavis_block">
                    <label><small data-i18n="Disclaimer Template">免责声明伪装</small></label>
                    <textarea id="clavis_template_disclaimer" class="text_pole" rows="3"></textarea>
                </div>
                
                <div class="clavis_block">
                    <label><small data-i18n="Word Count Control Template">字数控制</small></label>
                    <textarea id="clavis_template_wordCountControl" class="text_pole" rows="3"></textarea>
                </div>
                
                <div class="clavis_block flex-container">
                    <input id="clavis_save_templates" class="menu_button" type="button" data-i18n-value="Save Templates" value="💾 保存模板" />
                    <input id="clavis_import_templates" class="menu_button" type="button" data-i18n-value="Import Templates" value="📥 导入模板" />
                    <input id="clavis_export_templates" class="menu_button" type="button" data-i18n-value="Export Templates" value="📤 导出模板" />
                </div>
                <div class="clavis_block flex-container">
                    <input id="clavis_reset_templates" class="menu_button" type="button" data-i18n-value="Reset to Default" value="🔄 重置为默认" />
                </div>
                <input id="clavis_import_file" type="file" accept=".json" style="display: none;" />
            </div>

            <hr class="sysHR" />
            <h4 data-i18n="Prompt Configuration">📝 提示词配置</h4>
            
            <div class="clavis_block flex-container">
                <input id="clavis_identity_reset" type="checkbox" />
                <label for="clavis_identity_reset">
                    <small data-i18n="Identity Reset">身份重置技术</small>
                </label>
            </div>
            
            <div class="clavis_block flex-container">
                <input id="clavis_scenario_framework" type="checkbox" />
                <label for="clavis_scenario_framework">
                    <small data-i18n="Scenario Framework">场景框架构建</small>
                </label>
            </div>
            
            <div class="clavis_block flex-container">
                <input id="clavis_ai_self_persuasion" type="checkbox" />
                <label for="clavis_ai_self_persuasion">
                    <small data-i18n="AI Self Persuasion">AI自我说服技术</small>
                </label>
            </div>
            
            <div class="clavis_block flex-container">
                <input id="clavis_roleplay_induction" type="checkbox" />
                <label for="clavis_roleplay_induction">
                    <small data-i18n="Roleplay Induction">角色扮演诱导技术</small>
                </label>
            </div>
            
            <div class="clavis_block flex-container">
                <input id="clavis_safety_statement" type="checkbox" />
                <label for="clavis_safety_statement">
                    <small data-i18n="Safety Statement">安全声明转移技术</small>
                </label>
            </div>
            
            <div class="clavis_block flex-container">
                <input id="clavis_disclaimer" type="checkbox" />
                <label for="clavis_disclaimer">
                    <small data-i18n="Disclaimer">免责声明伪装技术</small>
                </label>
            </div>
            
            <div class="clavis_block flex-container">
                <input id="clavis_word_count_control" type="checkbox" />
                <label for="clavis_word_count_control">
                    <small data-i18n="Word Count Control">字数控制</small>
                </label>
            </div>

            <hr class="sysHR" />
            
            <div class="clavis_block">
                <label for="clavis_injection_depth">
                    <small data-i18n="Injection Depth">注入深度</small>
                </label>
                <input id="clavis_injection_depth" type="number" class="text_pole" min="0" max="10" value="4" />
                <small class="clavis_help" data-i18n="Injection Depth Hint">深度越大，越靠近对话历史，影响越大</small>
            </div>

            <hr class="sysHR" />
            <h4 data-i18n="Regex Filter Settings">🔍 正则过滤设置</h4>
            
            <div class="clavis_block flex-container">
                <input id="clavis_enable_regex_filter" type="checkbox" />
                <label for="clavis_enable_regex_filter">
                    <small data-i18n="Enable Regex Filter">启用正则过滤</small>
                </label>
            </div>
            
            <div class="clavis_block flex-container">
                <input id="clavis_hide_thought_chain" type="checkbox" />
                <label for="clavis_hide_thought_chain">
                    <small data-i18n="Hide Thought Chain">🐈 隐藏思维链内容</small>
                </label>
                <input id="clavis_edit_thought_chain" class="menu_button menu_button_icon" type="button" value="✏️" data-i18n-title="Edit Regex" title="编辑正则" />
            </div>
            
            <div class="clavis_block flex-container">
                <input id="clavis_hide_disclaimer" type="checkbox" />
                <label for="clavis_hide_disclaimer">
                    <small data-i18n="Hide Disclaimer">🐈 隐藏免责声明内容</small>
                </label>
                <input id="clavis_edit_disclaimer" class="menu_button menu_button_icon" type="button" value="✏️" data-i18n-title="Edit Regex" title="编辑正则" />
            </div>

            <hr class="sysHR" />
            
            <div class="clavis_block flex-container">
                <input id="clavis_test_bypass" class="menu_button" type="button" data-i18n-value="Test Bypass" value="🧪 测试绕过" />
            </div>

            <hr class="sysHR" />
            
            <div class="clavis_block flex-container">
                <small data-i18n="Language">语言</small>:
                <select id="clavis_language" class="text_pole">
                    <option value="zh-cn" data-i18n="Chinese">中文</option>
                    <option value="en" data-i18n="English">English</option>
                </select>
            </div>
            
            <div class="clavis_info">
                <small>
                    <b>ClavisSalomonis</b> - SillyTavern <span data-i18n="Extension Status">绕过审核扩展框架</span><br/>
                    <span data-i18n="Version">版本</span>: <span id="clavis_version_number">...</span><span id="clavis_version_badge" class="clavis-new-badge">NEW</span><br/>
                    <span id="clavis_remote_version_status" data-i18n="Checking for updates...">检查更新中...</span> | <span data-i18n="Author">作者</span>: NyaaCaster<br/>
                    <a href="https://github.com/NyaaCaster/st-ClavisSalomonis" target="_blank" data-i18n="Project Homepage">项目主页</a>
                </small>
            </div>
        </div>
    </div>
</div>
